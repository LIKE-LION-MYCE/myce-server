server:
  port: 8081

spring:
  application:
    name: myce-server
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/myce_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&zeroDateTimeBehavior=convertToNull
    username: myce
    password: nicemice@
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 1000

  data:
    mongodb:
      uri: mongodb://localhost:27017/myce