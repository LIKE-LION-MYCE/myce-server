    show-sql: true

  cloud: # AWS S3 Configuration
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY_ID:}
        secret-key: ${AWS_SECRET_ACCESS_KEY:}
      region:
        static: ${AWS_REGION:ap-northeast-2}
      s3:
        bucket:
          media: ${S3_MEDIA_BUCKET_NAME}
          cloudfront-domain: ${CLOUDFRONT_DOMAIN}
  mail:
    host: smtp.gmail.com
    port: 587
    username: chldlghk@gmail.com
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
            auth: true
            starttls: # isActive
              enable: true
jwt:
  secret: ${JWT_SECRET}
  access-token-validity: 18000000 # 5 hour in milliseconds
  refresh-token-validity: 1209600000 # 2 weeks in milliseconds

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    persistAuthorization: true
  api-docs:
    path: /v3/api-docs

# Spring Boot Actuator configuration for ALB health checks
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      enabled: true
      probes:
        enabled: true  # Enable liveness/readiness probes
      show-details: when-authorized
    info:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
  # Health check groups - separate liveness from readiness
  health:
    mail:
      enabled: false  # Exclude mail from all health checks
    group:
      liveness:
        include: livenessState, ping  # Light & internal checks only
      readiness:
        include: readinessState, db, redis, diskSpace  # Heavy checks
port-one:
  base-url: ${PORTONE_BASE_URL}
  api-key: ${PORTONE_API_KEY}
  api-secret: ${PORTONE_API_SECRET}
  customer-code: ${PORTONE_CUSTOMER_CODE}
  test-mode: false
scheduler:
  test: 0 * * * * * # every minute
  admin-timeout: 0 */1 * * * * # 1분마다 (테스트용) -> 담당자 배졍
  qr-code-activate: 0 * * * * * # QR 코드 활성화 - 매분 실행
  qr-code-expire: 0 * * * * * # QR 코드 만료 처리 - 매분 실행
